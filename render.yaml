services:
  - type: web
    name: verifai-web
    env: python
    plan: starter
    buildCommand: "bash build.sh"
    startCommand: "gunicorn verifai_web.wsgi:application"
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: verifai-db
          property: connectionString

databases:
  - name: verifai-db
    plan: starter
